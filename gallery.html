<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View RIYAA MAKEOVERS bridal, hair, facial, academy, student, and event gallery.">
  <title>Gallery | RIYAA MAKEOVERS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Playfair+Display:wght@600;700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="preloader" aria-hidden="true"><span>RIYAA</span></div>
  <div class="scroll-progress" aria-hidden="true"></div>
  <div class="cursor-glow" aria-hidden="true"></div>
  <header class="site-header" data-header></header>
  <main>
    <section class="page-hero gallery-hero">
      <div class="page-hero-copy reveal fade-up">
        <p class="eyebrow">Gallery</p>
        <h1>Pinterest-style beauty stories from bridal rooms, academy sessions, and studio rituals.</h1>
      </div>
    </section>
    <section class="section">
      <div class="filter-bar" data-gallery-filters>
        <button class="active" data-filter="all">All</button>
        <button data-filter="bridal">Bridal</button>
        <button data-filter="hair">Hair</button>
        <button data-filter="facial">Facial</button>
        <button data-filter="students">Students</button>
        <button data-filter="academy">Academy</button>
        <button data-filter="events">Events</button>
      </div>
      <div class="masonry-gallery" data-gallery></div>
    </section>
  </main>
  <div class="lightbox" data-lightbox aria-hidden="true">
    <button type="button" data-lightbox-close aria-label="Close image preview">Close</button>
    <img src="" alt="Gallery preview">
  </div>
  <footer class="site-footer"></footer>
  <a class="whatsapp-float" href="https://wa.me/910000000000" aria-label="Chat on WhatsApp">WA</a>
  <button class="back-to-top" type="button" data-back-top aria-label="Back to top">Up</button>
  <script src="js/main.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/gallery.js"></script>
</body>
</html>
